<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TS GAMING Browser</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111827;touch-action:manipulation}
    .browser{display:grid;grid-template-rows:auto 1fr;width:100vw;height:100vh;background:#fff}
    .topbar{
      display:flex;align-items:center;gap:10px;min-height:72px;padding:10px 14px;
      background:
        radial-gradient(circle at 10% 0%,rgba(7,141,255,.30),transparent 32%),
        radial-gradient(circle at 52% 0%,rgba(255,0,110,.34),transparent 36%),
        radial-gradient(circle at 100% 0%,rgba(33,208,68,.22),transparent 30%),
        linear-gradient(180deg,#141416,#08090d);
      border-bottom:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 34px rgba(15,23,42,.38),inset 0 -1px 0 rgba(255,255,255,.08);
      z-index:2;
    }
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%}
    .tab{
      position:relative;height:48px;border:2px solid transparent;color:#fff;font-weight:900;font-size:15px;
      letter-spacing:0;padding:0 10px;border-radius:16px;cursor:pointer;overflow:hidden;text-transform:uppercase;
      text-align:center;transform:none!important;touch-action:manipulation;
      transition:background .25s ease,box-shadow .25s ease,border-color .25s ease,color .25s ease;
    }
    .tab::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(120deg,rgba(255,255,255,.26),transparent 36%,rgba(255,255,255,.14));
      opacity:.9;pointer-events:none;
    }
    .tab span{
      position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;
      white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.35);
    }
    .tab span::before{content:"✦";font-size:18px;line-height:1}
    .blue-tab{
      background:
        linear-gradient(110deg,#078dff,#8b35ff 45%,#ff0d7a) padding-box,
        linear-gradient(110deg,#078dff,#a329ff 48%,#ff0d7a) border-box;
      box-shadow:0 12px 28px rgba(7,141,255,.34),inset 0 1px 0 rgba(255,255,255,.28);
    }
    .fire-tab{
      background:
        linear-gradient(100deg,#ff006e 0%,#ff2f00 38%,#ffbc00 72%,#21d044 100%) padding-box,
        linear-gradient(100deg,#ff006e 0%,#ff2f00 42%,#ffbc00 78%,#21d044 100%) border-box;
      box-shadow:0 12px 28px rgba(255,112,0,.32),inset 0 1px 0 rgba(255,255,255,.28);
    }
    .green-tab{
      background:
        linear-gradient(110deg,#00c853,#00b8d4 48%,#2962ff) padding-box,
        linear-gradient(110deg,#00c853,#00b8d4 48%,#2962ff) border-box;
      box-shadow:0 12px 28px rgba(0,200,83,.28),inset 0 1px 0 rgba(255,255,255,.28);
    }
    .purple-tab{
      background:
        linear-gradient(110deg,#7c3aed,#db2777 48%,#f97316) padding-box,
        linear-gradient(110deg,#7c3aed,#db2777 48%,#f97316) border-box;
      box-shadow:0 12px 28px rgba(124,58,237,.28),inset 0 1px 0 rgba(255,255,255,.28);
    }
    .tab.active{
      color:#fff;
      background:
        linear-gradient(90deg,rgba(22,24,31,.92),rgba(23,24,31,.76)) padding-box,
        linear-gradient(110deg,#078dff,#a329ff 48%,#ff0d7a) border-box;
      box-shadow:0 9px 22px rgba(7,141,255,.22),0 0 0 3px rgba(7,141,255,.10),inset 0 1px 0 rgba(255,255,255,.16);
    }
    .tab:hover,.tab:active,.tab:focus{outline:none;transform:none!important}
    iframe{width:100%;height:100%;border:0;background:#fff}
    .loaderScreen{
      display:none;position:fixed;inset:72px 0 0;background:radial-gradient(circle at top,rgba(7,141,255,.10),transparent 35%),#fff;
      color:#111827;align-items:center;justify-content:center;flex-direction:column;z-index:1;text-align:center;padding:20px;
    }
    .loading .loaderScreen{display:flex}
    .loaderLogo{font-size:34px;font-weight:900;margin-bottom:18px;color:#fff;-webkit-text-stroke:2px #111827;-webkit-text-fill-color:#fff;letter-spacing:1px}
    .spinner{width:42px;height:42px;border:4px solid #e5e7eb;border-top-color:#0b7cff;border-radius:50%;animation:spin .8s linear infinite}
    .loaderScreen p{margin:8px 0 0;font-size:14px;color:#6b7280;font-weight:600}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:760px){
      .topbar{min-height:112px;padding:14px}
      .tabs{grid-template-columns:1fr 1fr;gap:10px}
      .tab{height:44px;font-size:13px;border-radius:14px}
      .loaderScreen{inset:112px 0 0}
    }
  </style>
</head>
<body>
  <div class="browser">
    <div class="topbar">
      <div class="tabs">
        <button class="tab blue-tab active" data-panel="user" type="button"><span>USER</span></button>
        <button class="tab fire-tab" data-panel="admin" type="button"><span>ADMIN</span></button>
        <button class="tab green-tab" data-panel="obsAdmin" type="button"><span>OBS ADMIN</span></button>
        <button class="tab purple-tab" data-panel="obsUser" type="button"><span>OBS USER</span></button>
      </div>
    </div>
    <iframe id="pageFrame" title="TS GAMING panel"></iframe>
  </div>

  <div class="loaderScreen">
    <div class="loaderLogo">TS GAMING</div>
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script>
    const frame = document.getElementById("pageFrame");
    const buttons = Array.from(document.querySelectorAll(".tab"));
    const DEFAULT_MATCH = "liveMatch1";

    const panels = {
      user: match => `user.html?match=${encodeURIComponent(match)}`,
      admin: () => "admin.html",
      obsAdmin: () => "obs-admin.html",
      obsUser: match => `obs.html?match=${encodeURIComponent(match)}`
    };

    let currentPanel = localStorage.getItem("ts_active_panel") || "user";

    function matchId() {
      return localStorage.getItem("obs_admin_locked_match_id") || localStorage.getItem("tsweb_match_id") || DEFAULT_MATCH;
    }

    function setActiveTab(type) {
      buttons.forEach(btn => btn.classList.toggle("active", btn.dataset.panel === type));
      localStorage.setItem("ts_active_panel", type);
      document.title = "TS GAMING " + type.replace(/([A-Z])/g, " $1").toUpperCase();
    }

    function showLoading() {
      frame.style.display = "none";
      document.body.classList.add("loading");
    }

    function showFrame() {
      frame.style.display = "block";
      document.body.classList.remove("loading");
    }

    function openPanel(type) {
      currentPanel = type;
      setActiveTab(type);
      showLoading();
      const url = panels[type](matchId());
      if (frame.src !== new URL(url, location.href).href) frame.src = url;
    }

    frame.addEventListener("load", showFrame);
    buttons.forEach(btn => btn.addEventListener("click", () => openPanel(btn.dataset.panel)));
    openPanel(currentPanel);
  </script>
</body>
</html>
