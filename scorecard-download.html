<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Scorecard</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:#111827;
  background:#e9eff5;
}

.page{
  max-width:980px;
  margin:24px auto;
  background:#fff;
  padding:30px;
  border:1px solid #d6e0ea;
  box-shadow:0 18px 48px rgba(15,23,42,.12);
}

#content{background:#fff}

.actions{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid #dfe7ef;
  padding:10px 0;
  margin:-30px -30px 20px;
  display:flex;
  justify-content:flex-end;
  gap:8px;
  z-index:3;
}

button{
  border:0;
  background:#10243d;
  color:#fff;
  border-radius:7px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
}

button.secondary{
  background:#e2e8f0;
  color:#10243d;
}

button:disabled{
  opacity:.65;
  cursor:wait;
}

.top{
  display:flex;
  justify-content:center;
  gap:18px;
  border-bottom:4px solid #10243d;
  padding:0 0 14px;
  text-align:center;
}

.top>div:first-child{width:100%}
.top>div:last-child{display:none}

h1{
  margin:0 auto;
  font-size:22px;
  line-height:1.18;
  color:#10243d;
  letter-spacing:0;
  text-align:center;
}

.muted{
  color:#64748b;
  font-size:12px;
  line-height:1.5;
}

.result{
  display:inline-block;
  font-size:18px;
  font-weight:900;
  color:#14532d;
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  border-radius:999px;
  margin-top:8px;
  padding:7px 12px;
}

.scoreline{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:16px 0;
}

.scorebox{
  border:1px solid #dce6ef;
  padding:13px 15px;
  border-radius:8px;
  background:#f8fafc;
}

.scorebox b{
  display:block;
  font-size:25px;
  color:#10243d;
  margin-top:4px;
}

.mom-box{
  border:1px solid #bbf7d0;
  background:#ecfdf5;
  border-radius:8px;
  padding:10px 12px;
  margin:-4px 0 12px;
  text-align:center;
  color:#14532d;
}

.mom-box span{
  display:block;
  font-size:10px;
  text-transform:uppercase;
  font-weight:900;
  color:#166534;
}

.mom-box b{
  display:block;
  font-size:20px;
  margin-top:2px;
  color:#14532d;
}

.mom-box small{
  display:block;
  font-size:11px;
  margin-top:1px;
  color:#166534;
}

h2{
  font-size:17px;
  margin:18px 0 8px;
  color:#10243d;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13px;
  margin-bottom:14px;
  border:1px solid #dfe7ef;
  border-radius:8px;
  overflow:hidden;
}

th,td{
  border:0;
  border-bottom:1px solid #e5edf4;
  padding:8px 7px;
  text-align:center;
}

tr:last-child td{border-bottom:0}

th{
  background:#f1f5f9;
  text-transform:uppercase;
  font-size:11px;
  color:#475569;
}

td:first-child,
th:first-child{
  text-align:left;
}

.match-info-table{
  table-layout:fixed;
  font-size:12px;
}

.match-info-table th,
.match-info-table td{
  text-align:center;
  vertical-align:top;
  overflow-wrap:anywhere;
}

.match-info-table th:first-child,
.match-info-table td:first-child{
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.fow-box{
  font-size:12px;
  line-height:1.65;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:8px;
  padding:12px;
  min-height:80px;
}

.innings-separator{
  border:0;
  border-top:6px solid #10243d;
  margin:30px 0 18px;
}

.innings-label{
  display:inline-block;
  background:#10243d;
  color:#fff;
  padding:8px 13px;
  border-radius:6px;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
  letter-spacing:.04em;
}

.downloading-pdf{
  background:#fff;
}

.downloading-pdf .page{
  max-width:980px;
  margin:0 auto;
  border:0;
  box-shadow:none;
}

.downloading-pdf .actions{
  display:none;
}

.downloading-pdf h1{
  font-size:20px;
}

.downloading-pdf h2{
  font-size:14px;
  margin:11px 0 6px;
}

.downloading-pdf .top{
  padding-bottom:8px;
  border-bottom-width:3px;
}

.downloading-pdf .muted{
  font-size:11px;
  line-height:1.3;
}

.downloading-pdf .result{
  font-size:14px;
  margin-top:6px;
  padding:6px 10px;
}

.downloading-pdf .scoreline{
  gap:9px;
  margin:10px 0;
}

.downloading-pdf .scorebox{
  padding:9px 11px;
}

.downloading-pdf .scorebox b{
  font-size:20px;
}

.downloading-pdf .mom-box{
  padding:6px 8px;
  margin:-2px 0 7px;
}

.downloading-pdf .mom-box b{
  font-size:16px;
}

.downloading-pdf .mom-box small{
  font-size:10px;
}

.downloading-pdf table{
  font-size:11px;
  margin-bottom:9px;
}

.downloading-pdf th{
  font-size:10px;
}

.downloading-pdf th,
.downloading-pdf td{
  padding:5px 6px;
}

.downloading-pdf .grid{
  gap:8px;
}

.downloading-pdf .fow-box{
  font-size:11px;
  line-height:1.4;
  padding:8px;
}

.downloading-pdf .innings-separator{
  border-top-width:3px;
  margin:12px 0 8px;
}

.downloading-pdf .innings-label{
  font-size:10px;
  padding:5px 8px;
  margin-bottom:6px;
}

@media print{
  body{background:#fff}
  .page{
    max-width:none;
    margin:0;
    border:0;
    padding:0;
    box-shadow:none;
  }
  .actions{display:none}
  .result{
    border-color:#d9eadf;
    background:#fff;
  }
  table{page-break-inside:auto}
  tr{
    page-break-inside:avoid;
    page-break-after:auto;
  }
}

@media(max-width:720px){
  .top,
  .scoreline,
  .grid{
    grid-template-columns:1fr;
    display:grid;
  }

  .page{
    margin:0;
    padding:16px;
    box-shadow:none;
  }

  .actions{
    margin:-16px -16px 16px;
  }

  h1{font-size:18px}
  .scorebox b{font-size:24px}

  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="actions">
    <button class="secondary" onclick="history.back()">Back</button>
    <button id="downloadPdfBtn" onclick="window.downloadScorecardPdf()">Download PDF</button>
  </div>

  <div id="content">Loading scorecard...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { getCompletedMatch } from './js/firebase-store.js';
import { overText, calcSR, calcER } from './js/live-sync.js';

const params = new URLSearchParams(location.search);
const matchId = params.get('match');

const safe = v => String(v ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;',
  '<':'&lt;',
  '>':'&gt;',
  '"':'&quot;',
  "'":'&#039;'
}[c]));

const fileSafe = v => String(v || 'match-scorecard')
  .replace(/[^\w\-]+/g, '-')
  .replace(/-+/g, '-')
  .replace(/^-|-$/g, '')
  .toLowerCase();

let pdfFileName = 'match-scorecard.pdf';

function batTable(rows = []) {
  return `
    <table>
      <thead>
        <tr>
          <th>Batter</th>
          <th>R</th>
          <th>B</th>
          <th>4s</th>
          <th>6s</th>
          <th>SR</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${
          rows.length
            ? rows.map(p => `
              <tr>
                <td>
                   <b>${safe(p.name || '-')}</b>${p.out ? '' : ' *'}
                </td>
                <td>${Number(p.r || 0)}</td>
                <td>${Number(p.b || 0)}</td>
                <td>${Number(p.f || 0)}</td>
                <td>${Number(p.s || 0)}</td>
                <td>${calcSR(p.r, p.b)}</td>
                <td>
  ${
    p.retired
      ? 'Retired'
      : p.out
        ? safe(p.dismissal || 'Out')
        : 'Not out'
  }
</td>
              </tr>
            `).join('')
            : `<tr><td colspan="7">No batting data</td></tr>`
        }
      </tbody>
    </table>
  `;
}

function bowlTable(stats = {}) {
  const entries = Object.entries(stats || {});

  return `
    <table>
      <thead>
        <tr>
          <th>Bowler</th>
          <th>O</th>
          <th>R</th>
          <th>W</th>
          <th>ER</th>
        </tr>
      </thead>
      <tbody>
        ${
          entries.length
            ? entries.map(([name, s]) => `
              <tr>
                <td><b>${safe(name)}</b></td>
                <td>${overText(s.balls || 0)}</td>
                <td>${Number(s.runs || 0)}</td>
                <td>${Number(s.wkts || 0)}</td>
                <td>${calcER(s.runs, s.balls)}</td>
              </tr>
            `).join('')
            : `<tr><td colspan="5">No bowling data</td></tr>`
        }
      </tbody>
    </table>
  `;
}

function fowBox(items = []) {
  return `
    <div class="fow-box">
      ${
        items.length
          ? items.map((x, i) => `${i + 1}. ${safe(x)}`).join('<br>')
          : 'No wickets'
      }
    </div>
  `;
}

function inningsSection(team, detail, fallbackBatting, fallbackBowling, isSecond = false) {
  const score = detail
    ? `${detail.runs || 0}/${detail.wkts || 0} (${detail.overs || overText(detail.balls || 0)})`
    : '-';

  const batting = detail?.battingScorecard || fallbackBatting || [];
  const bowling = detail?.bowlerStats || fallbackBowling || {};
  const fow = detail?.fallOfWickets || [];

  return `
    ${isSecond ? `
      <hr class="innings-separator">
      <div class="innings-label">Second Team Score</div>
    ` : ''}

    <h2>${safe(team)} - ${safe(score)}</h2>
    ${batTable(batting)}

    <div class="grid">
      <div>
        <h2>Bowling</h2>
        ${bowlTable(bowling)}
      </div>

      <div>
        <h2>Fall of Wickets</h2>
        ${fowBox(fow)}
      </div>
    </div>
  `;
}

function manOfMatch(match) {
  const stored = match?.mvp || match?.manOfMatch || match?.playerOfMatch;

  if (stored) {
    return {
      name: String(stored),
      note: 'official pick'
    };
  }

  const players = {};

  const ensure = name => {
    if (!name || name === '-') return null;
    if (!players[name]) {
      players[name] = {
        name,
        runs: 0,
        balls: 0,
        fours: 0,
        sixes: 0,
        wkts: 0,
        bowlingBalls: 0,
        bowlingRuns: 0,
        score: 0
      };
    }
    return players[name];
  };

  const addBat = row => {
    const p = ensure(row?.name);
    if (!p) return;

    const runs = Number(row.r || 0);
    const balls = Number(row.b || 0);
    const fours = Number(row.f || 0);
    const sixes = Number(row.s || 0);

    p.runs += runs;
    p.balls += balls;
    p.fours += fours;
    p.sixes += sixes;
    p.score += runs + (fours * 2) + (sixes * 3);

    if (runs >= 50) p.score += 10;
    else if (runs >= 30) p.score += 5;

    if (balls > 0 && runs >= 20 && (runs / balls) >= 1.5) {
      p.score += 6;
    }
  };

  const addBowl = stats => Object.entries(stats || {}).forEach(([name, s]) => {
    const p = ensure(name);
    if (!p) return;

    const wkts = Number(s?.wkts || 0);
    const balls = Number(s?.balls || 0);
    const runs = Number(s?.runs || 0);

    p.wkts += wkts;
    p.bowlingBalls += balls;
    p.bowlingRuns += runs;
    p.score += (wkts * 25);

    if (wkts >= 3) p.score += 12;
    if (balls >= 6 && runs <= balls) p.score += 5;
  });

  const details = match?.inningsDetails && typeof match.inningsDetails === 'object'
    ? Object.values(match.inningsDetails)
    : [];

  if (details.length) {
    details.forEach(d => {
      (Array.isArray(d?.battingScorecard) ? d.battingScorecard : []).forEach(addBat);
      addBowl(d?.bowlerStats);
    });
  } else {
    Object.values(match?.completedInnings || {}).forEach(rows => {
      (Array.isArray(rows) ? rows : []).forEach(addBat);
    });

    if (Array.isArray(match?.battingScorecard)) {
      match.battingScorecard.forEach(addBat);
    }

    Object.values(match?.completedBowling || {}).forEach(addBowl);
    addBowl(match?.bowlerStats);
  }

  const best = Object.values(players)
    .sort((a, b) => b.score - a.score || b.runs - a.runs || b.wkts - a.wkts)[0];

  if (!best) return null;

  const parts = [];
  if (best.runs) parts.push(`${best.runs} runs`);
  if (best.wkts) parts.push(`${best.wkts} wkts`);

  return {
    name: best.name,
    note: parts.join(', ') || 'best impact'
  };
}

function matchInfoTable(match) {
  return `
    <h2>Match Info</h2>
    <table class="match-info-table">
      <thead>
        <tr>
          <th>Winner</th>
          <th>League</th>
          <th>Stage</th>
          <th>Venue</th>
          <th>Toss</th>
          <th>Target</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>${safe(match.winnerText || '-')}</td>
          <td>${safe(match.leagueName || '-')}</td>
          <td>${safe(match.leagueStage || match.leagueRound || '-')}</td>
          <td>${safe(match.venue || '-')}</td>
          <td>${safe(match.tossText || '-')}</td>
          <td>${safe(match.target || '-')}</td>
        </tr>
      </tbody>
    </table>
  `;
}

async function render() {
  if (!matchId) {
    document.getElementById('content').innerHTML = 'Missing match id.';
    return;
  }

  const match = await getCompletedMatch(matchId);

  if (!match) {
    document.getElementById('content').innerHTML = 'Match not found.';
    return;
  }

  const details = match.inningsDetails || {};
  const detailTeams = Object.keys(details);

  const titleTeams = match.title && match.title.includes(' vs ')
    ? match.title.split(' vs ').map(x => x.replace(' - Super Over', ''))
    : [];

  const firstTeam = detailTeams[0] || titleTeams[0] || match.bowlingTeam || 'Team 1';
  const secondTeam = detailTeams[1] || titleTeams.find(t => t !== firstTeam) || match.battingTeam || 'Team 2';

  const reportTitle = [
    match.leagueName,
    match.leagueStage || (match.leagueMatchNo ? `Match ${match.leagueMatchNo}` : ''),
    match.title || match.matchTitle || 'Match Scorecard'
  ].filter(Boolean).join(' - ');

  const mom = manOfMatch(match);

  pdfFileName = `${fileSafe(reportTitle)}-scorecard.pdf`;
  document.title = pdfFileName.replace(/\.pdf$/i, '');

  document.getElementById('content').innerHTML = `
    <div class="top">
      <div>
        <h1>${safe(reportTitle)}</h1>
        <div class="muted">
          Match ID: ${safe(matchId)}
          ${match.playedAt ? ` | ${new Date(match.playedAt).toLocaleString()}` : ''}
        </div>
        <div class="muted">
          ${match.venue ? `Venue: ${safe(match.venue)} | ` : ''}
          ${match.scheduledAt ? `Scheduled: ${safe(match.scheduledAt)} | ` : ''}
          ${match.leagueMatchNo ? `Match No: ${safe(match.leagueMatchNo)}` : ''}
        </div>
        <div class="result">${safe(match.winnerText || 'Result pending')}</div>
      </div>
      <div class="muted">${safe(match.leagueName || 'Generated scorecard')}</div>
    </div>

    <div class="scoreline">
      <div class="scorebox">
        <div class="muted">${safe(firstTeam)}</div>
        <b>${safe(match.firstInnings || '-')}</b>
      </div>

      <div class="scorebox">
        <div class="muted">${safe(secondTeam)}</div>
        <b>${safe(match.secondInnings || '-')}</b>
      </div>
    </div>

    ${
      mom ? `
        <div class="mom-box">
          <span>Man of the Match</span>
          <b>${safe(mom.name)}</b>
          <small>${safe(mom.note)}</small>
        </div>
      ` : ''
    }

    ${matchInfoTable(match)}

    ${inningsSection(
      firstTeam,
      details[firstTeam],
      match.completedInnings?.[firstTeam],
      match.completedBowling?.[firstTeam],
      false
    )}

    ${inningsSection(
      secondTeam,
      details[secondTeam],
      match.completedInnings?.[secondTeam],
      match.completedBowling?.[secondTeam],
      true
    )}
  `;
}

window.downloadScorecardPdf = async function () {
  const btn = document.getElementById('downloadPdfBtn');
  const content = document.getElementById('content');
  const jsPDF = window.jspdf?.jsPDF;

  if (!content || !window.html2canvas || !jsPDF) {
    window.print();
    return;
  }

  const oldText = btn ? btn.innerText : '';

  try {
    if (btn) {
      btn.disabled = true;
      btn.innerText = 'Preparing...';
    }

    document.body.classList.add('downloading-pdf');
    await new Promise(resolve => requestAnimationFrame(resolve));

    const canvas = await window.html2canvas(content, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      windowWidth: content.scrollWidth
    });

    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = 210;
    const pageHeight = 297;
    const margin = 8;
    const maxWidth = pageWidth - (margin * 2);
    const maxHeight = pageHeight - (margin * 2);

    const widthRatio = maxWidth / canvas.width;
    const heightRatio = maxHeight / canvas.height;
    const ratio = Math.min(widthRatio, heightRatio);

    const imgWidth = canvas.width * ratio;
    const imgHeight = canvas.height * ratio;
    const imgData = canvas.toDataURL('image/jpeg', 0.98);

    const x = (pageWidth - imgWidth) / 2;
    const y = margin;

    pdf.addImage(imgData, 'JPEG', x, y, imgWidth, imgHeight);
    pdf.save(pdfFileName);
  } catch (err) {
    console.error(err);
    window.print();
  } finally {
    document.body.classList.remove('downloading-pdf');

    if (btn) {
      btn.disabled = false;
      btn.innerText = oldText || 'Download PDF';
    }
  }
};

render().catch(err => {
  document.getElementById('content').innerHTML = `Unable to load scorecard: ${safe(err.message)}`;
});
</script>
</body>
</html>
